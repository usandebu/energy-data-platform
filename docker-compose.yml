x-airflow-common: &airflow-common
  image: energy-data-platform-airflow
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@postgres/${AIRFLOW_POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
  volumes:
    - ./:/opt/airflow/project
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/project/data
    - /var/run/docker.sock:/var/run/docker.sock
  user: "0:0"
  working_dir: /opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy
  profiles:
    - airflow

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: energy-data-platform-app
    init: true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    working_dir: /app

  postgres:
    image: postgres:16
    profiles:
      - airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username "$${AIRFLOW_ADMIN_USERNAME}"
        --password "$${AIRFLOW_ADMIN_PASSWORD}"
        --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}"
        --lastname "$${AIRFLOW_ADMIN_LASTNAME}"
        --role Admin
        --email "$${AIRFLOW_ADMIN_EMAIL}"
        || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  postgres-db-volume: