x-airflow-common: &airflow-common
  image: energy-data-platform-airflow
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@postgres/${AIRFLOW_POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
    AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}
    RAW_BUCKET: ${RAW_BUCKET:?RAW_BUCKET is required}
    DATABRICKS_HOST: ${DATABRICKS_HOST:?DATABRICKS_HOST is required}
    DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH:?DATABRICKS_HTTP_PATH is required}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:?DATABRICKS_TOKEN is required}
    DATABRICKS_BRONZE_SILVER_JOB_ID: ${DATABRICKS_BRONZE_SILVER_JOB_ID:?DATABRICKS_BRONZE_SILVER_JOB_ID is required}
  volumes:
    - ./:/opt/airflow/project
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/project/data
    - /var/run/docker.sock:/var/run/docker.sock
  user: "0:0"
  working_dir: /opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy
  profiles:
    - airflow

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: energy-data-platform-app
    init: true
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}
    volumes:
      - ./data:/app/data
    working_dir: /app

  postgres:
    image: postgres:16
    profiles:
      - airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username "$${AIRFLOW_ADMIN_USERNAME}"
        --password "$${AIRFLOW_ADMIN_PASSWORD}"
        --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}"
        --lastname "$${AIRFLOW_ADMIN_LASTNAME}"
        --role Admin
        --email "$${AIRFLOW_ADMIN_EMAIL}"
        || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  terraform:
    image: hashicorp/terraform:1.15.8
    profiles:
      - infra
    working_dir: /workspace/infra/terraform
    volumes:
      - ./:/workspace
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}

  aws-cli:
    image: amazon/aws-cli:2.36.2
    profiles:
      - infra
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}

  dbt:
    image: energy-data-platform-dbt
    build:
      context: .
      dockerfile: Dockerfile.dbt
    profiles:
      - analytics
    working_dir: /workspace/dbt/energy_platform
    volumes:
      - ./:/workspace
    environment:
      DATABRICKS_HOST: ${DATABRICKS_HOST:?DATABRICKS_HOST is required}
      DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH:?DATABRICKS_HTTP_PATH is required}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:?DATABRICKS_TOKEN is required}
      DBT_PROFILES_DIR: /workspace/dbt

volumes:
  postgres-db-volume:
